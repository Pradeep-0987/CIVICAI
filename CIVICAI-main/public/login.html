<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CivicAI</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="auth-container w-full">
    <div class="auth-card">
      <div class="text-center mb-6">
        <i class="fas fa-city text-4xl mb-3" style="color: #818cf8;"></i>
        <h2 class="text-2xl">Welcome Back</h2>
        <p class="text-sm text-slate-400">Login to report & track civic issues.</p>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <label for="email"><i class="fas fa-envelope mr-2"></i>Email</label>
          <input type="email" id="email" required placeholder="Enter your email">
        </div>
        <div class="input-group">
          <label for="password"><i class="fas fa-lock mr-2"></i>Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn mt-4 shadow-lg shadow-indigo-500/30">
          <i class="fas fa-sign-in-alt mr-2"></i> Login
        </button>
      </form>
      <a href="signup.html" class="link hover:text-white transition mt-6">
        Don't have an account? <span class="text-white font-bold ml-1">Sign up</span>
      </a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
