<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CivicAI</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="auth-container w-full">
    <div class="auth-card">
      <div class="text-center mb-6">
        <i class="fas fa-user-plus text-4xl mb-3" style="color: #818cf8;"></i>
        <h2 class="text-2xl">Create Account</h2>
        <p class="text-sm text-slate-400">Join CivicAI to improve your city.</p>
      </div>
      <form id="signupForm">
        <div class="input-group">
          <label for="name"><i class="fas fa-user mr-2"></i>Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        <div class="input-group">
          <label for="email"><i class="fas fa-envelope mr-2"></i>Email Address</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        <div class="input-group">
          <label for="password"><i class="fas fa-lock mr-2"></i>Password</label>
          <input type="password" id="password" required placeholder="Create a strong password">
        </div>
        <div class="input-group">
          <label for="role"><i class="fas fa-user-tag mr-2"></i>Role</label>
          <select id="role">
            <option value="Citizen">Citizen User</option>
            <option value="Admin">City Administrator</option>
          </select>
        </div>
        <button type="submit" class="btn mt-4 shadow-lg shadow-indigo-500/30">
          <i class="fas fa-paper-plane mr-2"></i> Sign Up
        </button>
      </form>
      <a href="login.html" class="link hover:text-white transition mt-6">
        Already have an account? <span class="text-white font-bold ml-1">Login</span>
      </a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
