<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicAI - Smart City Complaints</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="auth-container w-full">
    <div class="text-center mb-8 fade-in">
      <h1 class="text-5xl font-extrabold mb-3 flex items-center justify-center gap-3">
        <i class="fas fa-city" style="color: #818cf8;"></i> 
        <span style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CivicAI</span>
      </h1>
      <p class="text-lg" style="color: #94a3b8;">Public Grievance Intelligence & Resolution</p>
    </div>
    <div class="auth-card">
      <div class="relative w-full h-40 mb-6 rounded-2xl overflow-hidden shadow-lg border border-white/10">
        <img src="https://images.unsplash.com/photo-1517737882209-646df8f79579?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="City" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-t from-[#0f172a] to-transparent"></div>
        <div class="absolute bottom-3 left-4">
          <span class="px-3 py-1 bg-white/20 backdrop-blur-md rounded-full text-xs font-semibold text-white border border-white/20">Smart City</span>
        </div>
      </div>
      <a href="login.html" class="btn mb-4 flex items-center justify-center gap-2">
        <i class="fas fa-sign-in-alt"></i> Login to Account
      </a>
      <a href="signup.html" class="btn btn-outline flex items-center justify-center gap-2">
        <i class="fas fa-user-plus"></i> Create Citizen Account
      </a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
