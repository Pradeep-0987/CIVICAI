<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CivicAI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-20">
  <header class="flex justify-between items-center px-6 py-4 sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10 shadow-lg">
    <h1 class="text-2xl font-bold flex items-center gap-2">
      <i class="fas fa-city" style="color:#818cf8;"></i> 
      <span style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CivicAI</span>
    </h1>
    <div class="font-semibold px-4 py-2 bg-white/5 rounded-full border border-white/10" id="userName">User</div>
  </header>

  <div class="container mx-auto px-4 py-8 fade-in max-w-4xl">
    <!-- Map Section -->
    <div class="mb-8 p-6 bg-white/5 backdrop-blur-xl rounded-2xl border border-white/10 shadow-xl">
      <h3 class="text-xl font-bold mb-4 text-white flex items-center gap-2"><i class="fas fa-map-marked-alt text-indigo-400"></i> City Map Overview</h3>
      <div id="map" class="w-full rounded-xl border border-white/10 shadow-inner h-80 z-0 relative"></div>
    </div>

    <!-- Feed Section -->
    <div class="mb-8">
      <h3 class="text-xl font-bold mb-6 text-white flex items-center gap-2"><i class="fas fa-stream text-indigo-400"></i> Recent Complaints</h3>
      <div class="complaint-list" id="feedContainer">
        <!-- Complaints rendered here -->
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="openModalBtn" title="Report Issue">
    <i class="fas fa-plus"></i>
  </button>

  <!-- Submit Modal -->
  <div class="modal" id="complaintModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-exclamation-circle text-rose-500"></i> Report Issue</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>
      <form id="complaintForm">
        <div class="input-group">
          <label class="text-sm font-medium text-slate-300">Title</label>
          <input type="text" id="cTitle" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="E.g. Broken Streetlight">
        </div>
        <div class="input-group">
          <label class="text-sm font-medium text-slate-300">Category</label>
          <select id="cCategory" required class="w-full bg-slate-800 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            <option value="Garbage">Garbage & Sanitation</option>
            <option value="Road Damage">Road Damage / Potholes</option>
            <option value="Water Leakage">Water Leakage</option>
            <option value="Streetlight Issue">Streetlight Issue</option>
          </select>
        </div>
        <div class="input-group">
          <label class="text-sm font-medium text-slate-300">Description</label>
          <textarea id="cDesc" rows="3" required class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="Provide details..."></textarea>
        </div>
        <div class="input-group">
          <label class="text-sm font-medium text-slate-300">Location</label>
          <div class="flex gap-2">
            <input type="text" id="cAddress" required class="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500" placeholder="Address or click get location">
            <button type="button" class="bg-indigo-500/20 text-indigo-400 border border-indigo-500/50 hover:bg-indigo-500 hover:text-white px-4 py-2 rounded-lg transition" id="pickLocationBtn" title="Detect Location">
              <i class="fas fa-crosshairs"></i>
            </button>
          </div>
          <input type="hidden" id="cLat">
          <input type="hidden" id="cLng">
        </div>
        <div class="input-group">
          <label class="text-sm font-medium text-slate-300 mb-2 block">Upload Evidence (Image)</label>
          <div class="file-upload-wrapper">
            <i class="fas fa-cloud-upload-alt file-upload-icon text-3xl"></i>
            <span class="file-upload-text">Click to upload image</span>
            <input type="file" id="cImage" accept="image/*">
            <img id="imagePreview" alt="Preview">
          </div>
        </div>
        <button type="submit" class="btn w-full mt-6 shadow-lg shadow-indigo-500/30 font-bold py-4">
          <i class="fas fa-paper-plane mr-2"></i> Submit Complaint
        </button>
      </form>
    </div>
  </div>

  <!-- Fullscreen Image Modal (Lightbox) -->
  <div id="imageModal" class="fixed inset-0 z-[2000] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
    <button onclick="closeImageModal()" class="absolute top-6 right-6 text-white text-4xl hover:text-rose-400 transition">&times;</button>
    <img id="lightboxImage" src="" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl border border-white/20">
  </div>

  <!-- Complaint Details Modal -->
  <div id="detailsModal" class="fixed inset-0 z-[1005] hidden bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-4">
    <div class="bg-slate-800 border border-white/10 p-8 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl relative">
      <button onclick="closeDetailsModal()" class="absolute top-6 right-6 text-slate-400 text-3xl hover:text-rose-400 transition">&times;</button>
      <h2 id="modalTitle" class="text-3xl font-bold text-white mb-2"></h2>
      <div class="flex gap-2 mb-6">
        <span id="modalCategory" class="px-3 py-1 bg-white/10 text-slate-300 rounded-full text-xs font-semibold border border-white/10"></span>
        <span id="modalStatus" class="px-3 py-1 rounded-full text-xs font-semibold border"></span>
        <span id="modalDate" class="px-3 py-1 bg-white/5 text-slate-400 rounded-full text-xs font-semibold border border-white/10 ml-auto"></span>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <img id="modalImg" src="" class="w-full h-48 object-cover rounded-xl shadow-md border border-white/10 cursor-pointer" onclick="openImageModal(this.src)">
          <p class="text-xs text-slate-400 mt-2 text-center"><i class="fas fa-search-plus"></i> Click image to enlarge</p>
        </div>
        <div class="space-y-4">
          <div>
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Description</h4>
            <p id="modalDesc" class="text-slate-200 text-sm leading-relaxed bg-white/5 p-3 rounded-lg border border-white/5"></p>
          </div>
          <div>
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Department</h4>
            <p id="modalDept" class="text-slate-200 text-sm flex items-center gap-2"><i class="fas fa-building text-indigo-400"></i> <span></span></p>
          </div>
          <div>
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Location</h4>
            <p id="modalLoc" class="text-slate-200 text-sm flex items-center gap-2"><i class="fas fa-map-marker-alt text-rose-400"></i> <span></span></p>
          </div>
        </div>
      </div>
      
      <div class="flex flex-wrap gap-4 pt-6 border-t border-white/10 mt-6" id="modalActions">
        <!-- Actions injected dynamically -->
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i>Home</a>
    <a href="#map" class="nav-item"><i class="fas fa-map"></i>Map</a>
    <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-user-circle"></i>Logout</a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Handle image preview
    document.getElementById('cImage').addEventListener('change', function(e) {
      if(e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const preview = document.getElementById('imagePreview');
          preview.src = e.target.result;
          preview.style.display = 'block';
        }
        reader.readAsDataURL(e.target.files[0]);
      }
    });
  </script>
</body>
</html>
